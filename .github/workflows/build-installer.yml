name: Build Installer

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build_and_package:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Installer
      run: .\build-installer.bat
      shell: cmd

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: SchedulesExcelExport.Revit.Addin.Installer
        path: src/output/*.exe
